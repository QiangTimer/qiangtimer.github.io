title: Qiang Meta
description: Embedded & infrastructure security research
url: https://qiangtimer.github.io
baseurl: ""
lang: en
timezone: Asia/Shanghai

author:
  name: Qiang
  email: ""

github:
  repository: qiangtimer/qiangtimer.github.io

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

excerpt_separator: "<!--more-->"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Path: _writings/{series}/briefs|analysis/{slug}.md
# URL:  /series/{series}/briefs|analysis/{slug}/
collections:
  writings:
    output: true
    permalink: /series/:path/
  series:
    output: true
    permalink: /series/:name/
  disclosure:
    output: true
    permalink: /disclosure/:name/

defaults:
  - scope:
      path: ""
      type: writings
    values:
      layout: article
  - scope:
      path: ""
      type: series
    values:
      layout: series
  - scope:
      path: ""
      type: disclosure
    values:
      layout: article
  - scope:
      path: ""
      type: pages
    values:
      layout: page

series_list:
  - id: agent
    title: Agent
    subtitle: Analysis automation & human-in-the-loop research
  - id: vulnerability
    title: Vulnerability
    subtitle: From observation to issue & exploitability judgment
  - id: firmware
    title: Firmware
    subtitle: Structure, crypto, unpack boundaries, IPC
  - id: network-probing
    title: Network Probing
    subtitle: Exposure, fingerprinting, recon methodology
  - id: offense-defense
    title: Offense & Defense
    subtitle: Constrained attack-path validation & defense insight

exclude:
  - Gemfile
  - Gemfile.lock
  - CONTENT.md
  - vendor
  - .gitignore
